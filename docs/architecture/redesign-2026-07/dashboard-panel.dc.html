<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
@font-face{font-family:'Inter';src:local('Inter');}
body{margin:0;background:#f4f5f7;font-family:'Inter',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
a{color:#2563eb;text-decoration:none;}
a:hover{color:#1d4ed8;text-decoration:underline;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.45;}}
</style>
</helmet>

<div style="min-height:100vh;display:flex;flex-direction:column;color:#1a1d23;">

  <!-- Top bar -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:#12151c;color:#fff;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#f97316,#ef4444);flex:none;"></div>
      <div style="font-size:16px;font-weight:600;letter-spacing:-0.01em;">Spark Cluster Monitor</div>
      <div style="font-size:12px;color:#8b93a3;padding-left:10px;border-left:1px solid #2a2f3a;margin-left:2px;">prod-cluster-01 &middot; standalone</div>
    </div>
    <div style="display:flex;align-items:center;gap:18px;">
      <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#8b93a3;">
        <span style="width:7px;height:7px;border-radius:50%;background:#22c55e;animation:pulse 2s ease-in-out infinite;"></span>
        Live &middot; updates every 2s
      </div>
      <div style="font-size:12px;color:#8b93a3;">{{ nowLabel }}</div>
    </div>
  </div>

  <!-- OVERVIEW view: job summary strip + node grid -->
  <sc-if value="{{ isOverview }}" hint-placeholder-val="{{ true }}">
    <!-- alert banner, job summary strip, node cards with CPU/RAM/disk/net/GC — see full export -->
  </sc-if>

  <!-- JOB DETAIL view: stage timeline, bottleneck flag cards, per-node partition table -->
  <sc-if value="{{ isJobDetail }}" hint-placeholder-val="{{ false }}">
    <!-- see full export -->
  </sc-if>

  <!-- NODE DETAIL view: CPU/RAM/GC/IO tiles, CPU/RAM history bars, per-node partition table -->
  <sc-if value="{{ isNodeDetail }}" hint-placeholder-val="{{ false }}">
    <!-- see full export -->
  </sc-if>
</div>

</x-dc>
</body>
</html>
