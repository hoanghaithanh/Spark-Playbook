name: Deploy (LAN homelab)

# Auto-deploys to the homelab server (README "Deploy (LAN-only, home
# server)") on every push to main -- a direct commit or a merged PR. Runs on
# a self-hosted runner physically on the homelab box itself, so `checkout`
# is the only "code transfer" step needed (no SSH/git-archive workaround).
on:
  push:
    branches: [main]
    # Skip doc-only pushes -- content/**/concept.md is rendered by the app
    # (app/topics/loader.py) so it's left out of this ignore list on purpose;
    # only paths nothing at runtime reads are listed here.
    paths-ignore:
      - '**/*.md'
      - '!content/**/*.md'
      - 'docs/**'
      - 'images/**'
      - 'LICENSE'
  workflow_dispatch: {}   # manual re-trigger without an empty commit

concurrency:
  group: deploy-lan
  # false, not true: cancelling a live run mid-`docker compose up` could
  # leave the LAN stack half-recreated. Queue instead of cancel.
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: self-hosted   # the default label every runner gets; no custom
                            # label needed while there's only one target runner
    timeout-minutes: 20
    steps:
      # This is a self-hosted runner: the workspace directory persists
      # between runs instead of starting fresh, so a root-owned file left
      # behind by a previous run (e.g. driver/jupyter_config.py's
      # .ipynb_checkpoints incident, fixed in that file, or anything else
      # written by a container that runs as root) permanently blocks every
      # future `actions/checkout`'s `git clean` step with EACCES -- there is
      # no fresh VM to reset the ownership for us. `docker run` as root
      # (default) to hand the whole workspace back to the runner's own
      # user/group before checkout touches it; safe no-op when nothing is
      # stale.
      - name: Fix ownership of any stale root-owned files from a prior run
        run: docker run --rm -v "$PWD:/ws" -w /ws alpine chown -R "$(id -u):$(id -g)" .

      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to homelab (LAN-only)
        env:
          LAN_IP: ${{ vars.HOMELAB_LAN_IP }}
        run: bash deploy-lan.sh

      - name: Post-deploy health check
        env:
          LAN_IP: ${{ vars.HOMELAB_LAN_IP }}
        run: bash deploy-lan/health-check.sh
