<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Spark Playbook{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">Spark Playbook</a>
    {# Persistent nav link (US-5.6, ADR D-E) -- always reachable, not
       conditioned on cluster state; /dashboard itself renders the
       "no active cluster" empty state when there's nothing to show. #}
    <a class="dashboard-link" href="/dashboard">Cluster Monitor</a>
  </header>
  <main class="content">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
